name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to deploy'
        required: true
        default: main

concurrency:
  group: mapanytime-api-deploy-production
  cancel-in-progress: true

env:
  ECR_REPOSITORY: mapanytime-api-prod # <-- must match the ECR repo you created
  AWS_REGION: ap-southeast-1 # <-- set to your production region
  NODE_ENV: production
  IMAGE_TAG: ${{ github.sha }}
  EC2_IAM_ROLE_NAME: forhu-production-mapanytime-api-role # <-- EC2 instance profile role name
  CONTAINER_NAME: mapanytime-api
  APP_PORT: 4002

jobs:
  deploy:
    name: Build, Push & Deploy (production)
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Grant EC2 role CloudWatch Logs access
        run: |
          aws iam put-role-policy \
            --role-name "${{ env.EC2_IAM_ROLE_NAME }}" \
            --policy-name mapanytime-api-cloudwatch-logs \
            --policy-document file://infra/ec2-cloudwatch-logs-policy.json

      - name: Grant EC2 role ECR pull access
        run: |
          aws iam put-role-policy \
            --role-name "${{ env.EC2_IAM_ROLE_NAME }}" \
            --policy-name mapanytime-api-ecr-pull \
            --policy-document file://infra/ec2-ecr-pull-policy.json

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          docker build -t "$ECR:${{ env.IMAGE_TAG }}" -t "$ECR:latest" .
          docker push "$ECR:${{ env.IMAGE_TAG }}"
          docker push "$ECR:latest"

      - name: Write env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST || 'localhost' }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || '6379' }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
          REDIS_TLS: ${{ secrets.REDIS_TLS || 'false' }}
          REDIS_TTL_SECONDS: ${{ secrets.REDIS_TTL_SECONDS || '3600' }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ACCESS_TOKEN_EXPIRY: ${{ secrets.ACCESS_TOKEN_EXPIRY || '7d' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          REFRESH_TOKEN_EXPIRY: ${{ secrets.REFRESH_TOKEN_EXPIRY || '1d' }}
          MAILER_TRANSPORT_HOST: ${{ secrets.MAILER_TRANSPORT_HOST || 'smtp.ethereal.email' }}
          MAILER_TRANSPORT_PORT: ${{ secrets.MAILER_TRANSPORT_PORT || '587' }}
          MAILER_TRANSPORT_SECURE: ${{ secrets.MAILER_TRANSPORT_SECURE || 'false' }}
          MAILER_EMAIL: ${{ secrets.MAILER_EMAIL || '' }}
          MAILER_PASSWORD: ${{ secrets.MAILER_PASSWORD || '' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY || secrets.AWS_ACCESS_KEY_ID || secrets.APP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.APP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || secrets.APP_AWS_REGION || env.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME || secrets.S3_BUCKET }}
          S3_CDN_URL: ${{ secrets.S3_CDN_URL || '' }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL || 'amqp://guest:guest@localhost:5672/' }}
          RABBITMQ_EXCHANGE: ${{ secrets.RABBITMQ_EXCHANGE || 'app_events_exchange' }}
          RABBITMQ_QUEUE_PREFIX: ${{ secrets.RABBITMQ_QUEUE_PREFIX || 'app' }}
          INGESTION_QUEUE_NAME: ${{ secrets.INGESTION_QUEUE_NAME || 'ingestion_jobs' }}
          WORKER_HEALTH_PORT: ${{ secrets.WORKER_HEALTH_PORT || '8080' }}
          METRICS_INTERVAL_MS: ${{ secrets.METRICS_INTERVAL_MS || '60000' }}
        run: |
          cat > ${{ github.workspace }}/mapanytime-api.env << EOF
          DATABASE_URL=${DATABASE_URL}
          NODE_ENV=${{ env.NODE_ENV }}
          PORT=${{ env.APP_PORT }}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          REDIS_TLS=${REDIS_TLS}
          REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS}
          ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
          ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY}
          REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
          REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY}
          MAILER_TRANSPORT_HOST=${MAILER_TRANSPORT_HOST}
          MAILER_TRANSPORT_PORT=${MAILER_TRANSPORT_PORT}
          MAILER_TRANSPORT_SECURE=${MAILER_TRANSPORT_SECURE}
          MAILER_EMAIL=${MAILER_EMAIL}
          MAILER_PASSWORD=${MAILER_PASSWORD}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_REGION=${AWS_REGION}
          AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
          S3_CDN_URL=${S3_CDN_URL}
          RABBITMQ_URL=${RABBITMQ_URL}
          RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE}
          RABBITMQ_QUEUE_PREFIX=${RABBITMQ_QUEUE_PREFIX}
          INGESTION_QUEUE_NAME=${INGESTION_QUEUE_NAME}
          WORKER_HEALTH_PORT=${WORKER_HEALTH_PORT}
          METRICS_INTERVAL_MS=${METRICS_INTERVAL_MS}
          EOF

      - name: Copy env file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: mapanytime-api.env
          target: /home/ec2-user/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            chmod 600 /home/ec2-user/mapanytime-api.env
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker image prune -a -f
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            # Run migrations before swapping the container.
            # --entrypoint overrides the image CMD so only the migration runs (not the app).
            docker run --rm \
              --entrypoint npx \
              --env-file /home/ec2-user/mapanytime-api.env \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
              prisma migrate deploy

            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ env.CONTAINER_NAME }} --restart unless-stopped \
              --env-file /home/ec2-user/mapanytime-api.env \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              --log-driver awslogs \
              --log-opt awslogs-region=${{ env.AWS_REGION }} \
              --log-opt awslogs-group=/mapanytime-api/production \
              --log-opt awslogs-stream=mapanytime-api \
              --log-opt awslogs-create-group=true \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            docker stop ${{ env.CONTAINER_NAME }}-worker 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }}-worker 2>/dev/null || true
            docker run -d --name ${{ env.CONTAINER_NAME }}-worker --restart unless-stopped \
              --env-file /home/ec2-user/mapanytime-api.env \
              -p 8080:8080 \
              --log-driver awslogs \
              --log-opt awslogs-region=${{ env.AWS_REGION }} \
              --log-opt awslogs-group=/mapanytime-api/production \
              --log-opt awslogs-stream=mapanytime-api-worker \
              --log-opt awslogs-create-group=true \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
              npm run worker

            docker image prune -f
