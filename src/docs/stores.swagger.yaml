tags:
  - name: Stores
    description: Operations related to store management

paths:
  /v1/stores:
    get:
      summary: Get all stores
      tags: [Stores]
      responses:
        '200':
          description: List of stores retrieved successfully
    post:
      summary: Create a new store
      tags: [Stores]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [storeName]
              properties:
                storeName:
                  type: string
                  example: Luzon Route Merchant 01
                description:
                  type: string
                  example: A great place for local goods.
      responses:
        '201':
          description: Store created successfully
        '401':
          description: Unauthorized
