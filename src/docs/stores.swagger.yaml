tags:
  - name: Stores
    description: Operations related to store management

paths:
  /v1/stores/nearby:
    get:
      summary: Get nearby stores based on map viewport
      description: Fetches a localized list of stores within the provided bounding box coordinates using the Haversine formula.
      tags: [Stores]
      parameters:
        - in: query
          name: north
          required: true
          schema:
            type: number
            example: 16.43
        - in: query
          name: south
          required: true
          schema:
            type: number
            example: 16.39
        - in: query
          name: east
          required: true
          schema:
            type: number
            example: 120.62
        - in: query
          name: west
          required: true
          schema:
            type: number
            example: 120.58
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 100
        - in: query
          name: lat
          required: false
          schema:
            type: number
          description: User's exact latitude for precise distance calculation
        - in: query
          name: lng
          required: false
          schema:
            type: number
          description: User's exact longitude for precise distance calculation
      responses:
        '200':
          description: List of nearby stores retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error for query parameters

  /v1/stores:
    post:
      summary: Create a new store branch
      description: Submits a new store application including location data, operating hours, and S3 document keys.
      tags: [Stores]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [storeData, locationData, hoursData, documents]
              properties:
                storeData:
                  type: object
                  required: [storeName]
                  properties:
                    storeName:
                      type: string
                      example: Central Market Branch
                    description:
                      type: string
                      example: Main hub for fresh produce.
                locationData:
                  type: object
                  required: [currentAddress, homeAddress, city, province, zipCode, country, latitude, longitude]
                  properties:
                    currentAddress:
                      type: string
                      example: 123 Main St
                    homeAddress:
                      type: string
                      example: 456 Owner Ave
                    city:
                      type: string
                      example: Baguio City
                    province:
                      type: string
                      example: Benguet
                    zipCode:
                      type: string
                      example: 2600
                    country:
                      type: string
                      example: Philippines
                    latitude:
                      type: number
                      example: 16.4023
                    longitude:
                      type: number
                      example: 120.5960
                hoursData:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [dayOfWeek, openTime, closeTime]
                    properties:
                      dayOfWeek:
                        type: integer
                        example: 1
                      openTime:
                        type: string
                        example: "08:00"
                      closeTime:
                        type: string
                        example: "18:00"
                      isClosed:
                        type: boolean
                        default: false
                documents:
                  type: object
                  required: [mayorsPermitFileName, mayorsPermitKey, tinIdFileName, tinIdKey, dtiCertificateFileName, dtiCertificateKey, govIdFileName, govIdKey]
                  properties:
                    mayorsPermitFileName:
                      type: string
                      example: permit.pdf
                    mayorsPermitKey:
                      type: string
                      example: compliance/abcdef12345.pdf
                    tinIdFileName:
                      type: string
                      example: tin.jpg
                    tinIdKey:
                      type: string
                      example: compliance/abcdef12346.jpg
                    dtiCertificateFileName:
                      type: string
                      example: dti.pdf
                    dtiCertificateKey:
                      type: string
                      example: compliance/abcdef12347.pdf
                    govIdFileName:
                      type: string
                      example: id.png
                    govIdKey:
                      type: string
                      example: compliance/abcdef12348.png
      responses:
        '201':
          description: Store created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation Error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (User is not a seller)

  /v1/stores/my-stores:
    get:
      summary: Retrieve all store branches owned by the authenticated seller
      description: Fetches a list of stores and their corresponding location data tied to the seller's JWT.
      tags: [Stores]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of the seller's stores retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (User is authenticated but not registered as a seller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'