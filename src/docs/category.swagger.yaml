tags:
  - name: Categories
    description: Global hierarchical product categories managed by administrators

paths:
  /v1/categories:
    get:
      summary: Retrieve categories
      description: Fetches root categories if no parentId is provided. If a parentId is provided, fetches the specific sub-categories. Open to all authenticated users.
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: parentId
          schema:
            type: string
          required: false
          description: The ID of the parent category. Leave empty to retrieve generic store root categories.
      responses:
        '200':
          description: List of categories retrieved successfully
        '401':
          description: Unauthorized (Invalid or missing token)

    post:
      summary: Create a new global category
      description: Creates a new category. Only accessible by users with the ADMIN role.
      tags: [Categories]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Seasonal Promotions
                description:
                  type: string
                  example: Temporary categories for holidays
                parentId:
                  type: string
                  example: cmr1kabey0004nh306b2ziapm
                  description: Optional. The ID of the parent category if creating a sub-category.
      responses:
        '201':
          description: Category created successfully
        '400':
          description: Bad request (Validation error)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (User is not an administrator)

  /v1/categories/root:
    get:
      summary: Retrieve root categories
      description: Returns all root categories (those with no parent), trimmed to id and name. Open to all authenticated users.
      tags: [Categories]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Root categories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  statusCode: { type: integer, example: 200 }
                  message: { type: string, example: Categories fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, example: cmr1kabey0004nh306b2ziapm }
                        name: { type: string, example: Food }
        '401':
          description: Unauthorized (Invalid or missing token)
        '404':
          description: No categories found

  /v1/categories/branch:
    get:
      summary: Retrieve branch categories
      description: Returns all branch (non-root) categories — those that have a parent — trimmed to id, name, and the parent's id and name. Open to all authenticated users.
      tags: [Categories]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Branch categories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  statusCode: { type: integer, example: 200 }
                  message: { type: string, example: Categories fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, example: cmr1kabey0007nh306b2zi999 }
                        name: { type: string, example: Coffee }
                        parent:
                          type: object
                          properties:
                            id: { type: string, example: cmr1kabey0004nh306b2ziapm }
                            name: { type: string, example: Food }
        '401':
          description: Unauthorized (Invalid or missing token)
        '404':
          description: No categories found

  /v1/categories/trees:
    get:
      summary: Retrieve the category tree
      description: Returns root categories with their descendants nested (up to 3 levels deep), trimmed to id and name at every level. Open to all authenticated users.
      tags: [Categories]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Category tree retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  statusCode: { type: integer, example: 200 }
                  message: { type: string, example: Categories fetched successfully }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryTreeNode'
        '401':
          description: Unauthorized (Invalid or missing token)
        '404':
          description: No categories found

  /v1/categories/{id}:
    patch:
      summary: Update a category
      description: Modifies the name or description of an existing category. Only accessible by Admins.
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The unique identifier of the category to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Category Name
                description:
                  type: string
                  example: Updated category description
      responses:
        '200':
          description: Category updated successfully
        '400':
          description: Bad request (Validation error)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (User is not an administrator)
        '404':
          description: Category not found

    delete:
      summary: Delete a category
      description: Performs a safe hybrid delete. Hard deletes the category if it has no dependencies. Soft deletes (isActive = false) if sub-categories, products, or stores are linked to it. Only accessible by Admins.
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The unique identifier of the category to delete.
      responses:
        '200':
          description: Category successfully deleted (hard or soft depending on dependencies)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (User is not an administrator)
        '404':
          description: Category not found

components:
  schemas:
    # Recursive node used by GET /v1/categories/trees (id + name at every level).
    CategoryTreeNode:
      type: object
      properties:
        id:
          type: string
          example: cmr1kabey0004nh306b2ziapm
        name:
          type: string
          example: Food
        children:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTreeNode'
