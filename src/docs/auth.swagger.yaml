tags:
  - name: Auth
    description: Authentication and authorization operations

paths:
  /v1/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, roleName]
              properties:
                email:
                  type: string
                  example: newseller1@example.com
                password:
                  type: string
                  example: securePass123!
                firstName:
                  type: string
                  example: Seller
                lastName:
                  type: string
                  example: 1
                roleName:
                  type: string
                  example: SELLER
                countryCode:
                  type: string
                  example: +63
                sellerDocuments:
                  type: object
                  description: Required only if roleName is SELLER
                  required: [tinIdFileName, tinIdKey, govIdFileName, govIdKey]
                  properties:
                    tinIdFileName:
                      type: string
                      example: tin.jpg
                    tinIdKey:
                      type: string
                      example: documents/abcdef12346.jpg
                    govIdFileName:
                      type: string
                      example: id.png
                    govIdKey:
                      type: string
                      example: documents/abcdef12348.png
      responses:
        '201':
          description: User created successfully
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: newseller1@example.com
                password:
                  type: string
                  example: securePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Invalid credentials

  /v1/auth/refresh-token:
    post:
      summary: Refresh access token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
        '400':
          description: Invalid request

  /v1/auth/logout:
    post:
      summary: Log out a user
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized - Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
