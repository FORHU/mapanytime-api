tags:
  - name: Auth
    description: Authentication and authorization operations

paths:
  /v1/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, roleName]
              properties:
                email:
                  type: string
                  example: newuser@example.com
                password:
                  type: string
                  example: securePass123!
                firstName:
                  type: string
                  example: Jane
                lastName:
                  type: string
                  example: Doe
                roleName:
                  type: string
                  example: BUYER
                countryCode:
                  type: string
                  example: 63
      responses:
        '201':
          description: User created successfully
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: dual@example.com
                password:
                  type: string
                  example: Dual123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Invalid credentials

  /v1/auth/refresh-token:
    post:
      summary: Refresh access token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
        '400':
          description: Invalid request

  /v1/auth/logout:
    post:
      summary: Log out a user
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized - Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'